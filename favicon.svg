<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Globe lines -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <ellipse cx="32" cy="32" rx="10" ry="18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="14" y1="32" x2="50" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="32" y1="14" x2="32" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Ring -->
  <ellipse cx="32" cy="38" rx="22" ry="6" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
  <!-- Antenna dot -->
  <circle cx="32" cy="12" r="3" fill="white"/>
  <line x1="32" y1="14" x2="32" y2="18" stroke="white" stroke-width="2"/>
</svg>
